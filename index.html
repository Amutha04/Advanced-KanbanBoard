<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Kanban Board</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Add/Edit Modal -->
  <div id="taskModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">Add New Task</h2>

      <form id="taskForm">
        <input type="hidden" id="editTaskId" />

        <input type="text" id="taskTitle" placeholder="Task title" required />
        <textarea id="taskDescription" placeholder="Task description" required></textarea>

        <label>Due Date</label>
        <input type="date" id="taskDueDate" required />

        <label>Priority</label>
        <select id="taskPriority" required>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>

        <div class="modal-actions">
          <button type="submit">Save Task</button>
          <button type="button" id="closeModal">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <header class="header">
    <h1>Advanced Kanban Board</h1>
    <div>
      <select id="filterPriority">
        <option value="all">All Priorities</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <button id="sortBtn">Sort by Due Date</button>
      <button id="darkModeToggle">🌙</button>
      <button id="addTaskBtn">Add Task</button>
    </div>
  </header>

  <main class="board">
    <div class="column" data-status="todo">
      <h2>Todo</h2>
      <div class="task-list" id="todoList"></div>
    </div>

    <div class="column" data-status="in-progress">
      <h2>In Progress</h2>
      <div class="task-list" id="inProgressList"></div>
    </div>

    <div class="column" data-status="done">
      <h2>Done</h2>
      <div class="task-list" id="doneList"></div>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
